name: Build Native Apps

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run app:build

      - name: Sync Android Project
        run: |
          npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: testers
          file: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Tax Calculator ${{ github.ref_name }} Release
            
            ### 주요 제공 기능 (Features)
            1. **배우자 데이터 실시간 연동 (Spouse Sync)**
               - 6자리 연동 코드를 이용한 실시간 원격 연동 (ntfy.sh 브로커 사용, 브라우저 단에서 XOR 대칭키 암호화하여 데이터 노출 완전 방지).
               - 오프라인 연동 지원 (클립보드 Base64 복사/붙여넣기).
               - 배우자 데이터를 똑똑하게 결합(Merge)해 주는 스마트 병합 및 전체 덮어쓰기 옵션 제공.
            2. **모바일 앱 하이브리드 패키징 (Capacitor)**
               - Capacitor를 통한 Android 및 iOS 앱 빌드 환경 구축.
               - 모든 금액 입력창 아래 한글 단위 레이블 표시 (단위 조절 버튼은 제거하여 사용자 인터페이스 직관화).
            3. **자동화된 CI/CD 파이프라인 (GitHub Actions)**
               - 커밋/푸시 시 Android APK 및 iOS 앱 자동 컴파일 검증.
               - Firebase App Distribution 연동으로 테스터에게 APK 자동 업로드.
               - GitHub Release 자동화 및 빌드 산출물(APK) 첨부.
          draft: false
          prerelease: false

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run app:build

      - name: Add iOS Platform
        run: |
          npx cap add ios

      - name: Sync iOS Project
        run: |
          npx cap sync ios

      - name: Install Pods
        run: |
          cd ios/App && pod install

      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build
